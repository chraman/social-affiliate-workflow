<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Queue Dashboard</title>
<style>
  :root {
    --bg: #15161a;
    --surface: #1e2025;
    --surface-2: #262931;
    --border: #34373f;
    --text: #ece9e2;
    --text-dim: #9a9da6;
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.16);
    --success: #6fae8f;
    --danger: #c97b7b;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: 100px;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  header h1 {
    font-size: 17px;
    margin: 0 0 10px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  select {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 15px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
  }
  .tab.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  main { padding: 14px; }

  .outfit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .outfit-header {
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .outfit-name { font-size: 14px; font-weight: 600; }
  .outfit-price { font-size: 13px; color: var(--text-dim); }
  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .image-tile {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
    cursor: pointer;
  }
  .image-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .image-tile .check {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: white;
  }
  .image-tile .pos-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-tile.selected .check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .image-tile.selected .check::after { content: "✓"; }
  .image-tile.selected { outline: 2px solid var(--accent); outline-offset: -2px; }

  .tile-actions {
    position: absolute;
    bottom: 6px;
    left: 6px;
    right: 6px;
    display: flex;
    justify-content: space-between;
    z-index: 2;
  }
  .tile-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.55);
    color: white;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  .tile-btn:disabled { opacity: 0.5; }

  .tray {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    z-index: 20;
    transform: translateY(100%);
    transition: transform 0.2s ease;
  }
  .tray.open { transform: translateY(0); }
  .tray-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .tray-summary strong { font-size: 14px; }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn.secondary {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn.full { width: 100%; padding: 13px; }
  .btn.small { padding: 6px 10px; font-size: 12px; }

  .float-tray-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--accent);
    color: white;
    border-radius: 30px;
    padding: 12px 18px;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    z-index: 19;
    border: none;
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 30;
    display: none;
    align-items: flex-end;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 18px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin: 0 0 14px; }
  .modal label {
    font-size: 12px;
    color: var(--text-dim);
    display: block;
    margin: 12px 0 6px;
  }
  textarea, input[type=datetime-local] {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { min-height: 90px; resize: vertical; }
  .selected-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .selected-strip img, .selected-strip video {
    width: 56px;
    height: 70px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-actions .btn { flex: 1; }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 14px;
  }
  .queue-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
  }
  .queue-item .q-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .queue-item .q-time { font-size: 13px; color: var(--accent); font-weight: 600; }
  .queue-item .q-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface-2);
    color: var(--text-dim);
  }
  .queue-item .q-media-type {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    background: var(--accent-soft);
    color: var(--accent);
    margin-left: 6px;
  }
  .queue-item .q-imgs { display: flex; gap: 4px; margin: 8px 0; }
  .queue-item .q-imgs img, .queue-item .q-imgs video { width: 40px; height: 50px; object-fit: cover; border-radius: 4px; }
  .queue-item .q-caption { font-size: 13px; color: var(--text-dim); }
  .queue-item .q-delete {
    font-size: 12px;
    color: #c97b7b;
    background: none;
    border: none;
    margin-top: 8px;
    cursor: pointer;
  }

  .video-card {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px;
    margin-bottom: 10px;
  }
  .video-thumb {
    position: relative;
    width: 90px;
    height: 112px;
    flex-shrink: 0;
    border-radius: 8px;
    overflow: hidden;
    background: var(--surface-2);
  }
  .video-thumb img, .video-thumb video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .video-status-badge {
    position: absolute;
    bottom: 4px;
    left: 4px;
    right: 4px;
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    padding: 2px 0;
    border-radius: 6px;
    background: rgba(0,0,0,0.6);
  }
  .video-status-badge.status-processing { color: #e0c069; }
  .video-status-badge.status-ready { color: var(--success); }
  .video-status-badge.status-failed { color: var(--danger); }
  .video-info { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .video-actions { display: flex; gap: 6px; margin-top: auto; }
  .video-hint {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 0 20px 10px;
  }
</style>
</head>
<body>

<header>
  <h1>📋 Post Queue Dashboard</h1>
  <select id="categorySelect"><option value="">Loading categories…</option></select>
  <div class="tabs">
    <div class="tab active" data-view="select">Select Media</div>
    <div class="tab" data-view="videos">Video Queue</div>
    <div class="tab" data-view="queue">Queue</div>
  </div>
</header>

<main id="selectView"></main>
<main id="videosView" style="display:none;"></main>
<main id="queueView" style="display:none;"></main>

<button class="float-tray-toggle" id="trayToggle" style="display:none;"></button>

<div class="tray" id="tray">
  <div class="tray-summary">
    <strong id="traySummaryText">0 selected</strong>
    <button class="btn secondary" id="clearSelection">Clear</button>
  </div>
  <div class="selected-strip" id="selectedStrip"></div>
  <button class="btn full" id="openCaptionModal" style="margin-top:10px;">Continue →</button>
  <button class="btn secondary full" id="combineBtn" style="margin-top:8px;">🎞 Combine into one video</button>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>Create post</h2>
    <div class="selected-strip" id="modalSelectedStrip"></div>

    <label>Post type</label>
    <div id="postTypeLabel" style="font-size:14px;"></div>

    <label>Caption</label>
    <textarea id="captionInput" placeholder="Write a caption…"></textarea>

    <label>Schedule for</label>
    <input type="datetime-local" id="scheduleInput">

    <div class="modal-actions">
      <button class="btn secondary" id="cancelModal">Cancel</button>
      <button class="btn" id="confirmQueue">Add to Queue</button>
    </div>
  </div>
</div>

<script>
const state = {
  selected: [], // { media_type: 'IMAGE'|'VIDEO', image_id?, video_id?, product_id, image_url, outfit_name }
  category: ''
};

const selectView = document.getElementById('selectView');
const videosView = document.getElementById('videosView');
const queueView = document.getElementById('queueView');
const categorySelect = document.getElementById('categorySelect');
const tray = document.getElementById('tray');
const traySummaryText = document.getElementById('traySummaryText');
const selectedStrip = document.getElementById('selectedStrip');
const modalBackdrop = document.getElementById('modalBackdrop');

let videoPollTimer = null;

// ─── Tabs ───────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    selectView.style.display = 'none';
    videosView.style.display = 'none';
    queueView.style.display = 'none';
    clearInterval(videoPollTimer);

    if (tab.dataset.view === 'select') {
      selectView.style.display = 'block';
    } else if (tab.dataset.view === 'videos') {
      videosView.style.display = 'block';
      loadVideos();
      videoPollTimer = setInterval(loadVideos, 15000);
    } else {
      queueView.style.display = 'block';
      loadQueue();
    }
  });
});

// ─── Load categories ────────────────────────────────────
async function loadCategories() {
  try {
    const res = await fetch('/api/categories');
    const cats = await res.json();
    categorySelect.innerHTML = '<option value="">All categories</option>' +
      cats.map(c => `<option value="${c.category}">${c.category} (${c.image_count})</option>`).join('');
  } catch (err) {
    console.error("Error loading categories:", err);
  }
}

categorySelect.addEventListener('change', () => {
  state.category = categorySelect.value;
  loadMedia();
});

async function fetchCombinedMedia(category) {
  const encodedCategory = encodeURIComponent(category);
  const [imagesRes, videosRes] = await Promise.all([
    fetch(`/api/images?category=${encodedCategory}`),
    fetch(`/api/videos/grouped?category=${encodedCategory}`)
  ]);

  return {
    images: await imagesRes.json(),
    videos: await videosRes.json()
  };
}

function combineMedia(images, videos) {
  const map = new Map();

  // Process Images
  images.forEach(prod => {
    const key = (prod.outfit_name || `${prod.brand || ''} ${prod.name || ''}`).trim();

    if (!map.has(key)) {
      map.set(key, {
        ...prod,
        outfit_name: key,
        images: [],
        generated_videos: []
      });
    }

    const entry = map.get(key);

    if (prod.images) {
      entry.images.push(...prod.images);
    }
  });

  // Process Videos
  videos.forEach(prod => {
    const key = (prod.outfit_name || `${prod.brand || ''} ${prod.name || ''}`).trim();

    if (!map.has(key)) {
      map.set(key, {
        ...prod,
        outfit_name: key,
        images: [],
        generated_videos: []
      });
    }

    const entry = map.get(key);

    if (prod.generated_videos) {
      entry.generated_videos.push(...prod.generated_videos);
    }
  });

  return Array.from(map.values());
}
// ─── Load images and videos grouped by outfit ──────────────────────
async function loadMedia() {
  selectView.innerHTML = '<div class="empty-state">Loading…</div>';

  try {
    const result = await fetchCombinedMedia(state.category);
    const outfits = combineMedia(result.images, result.videos);
    
    if (outfits.length === 0) {
      selectView.innerHTML = '<div class="empty-state">No media found for this category.</div>';
      return;
    }

    selectView.innerHTML = outfits.map(outfit => {
      const allImages = outfit.images || [];
      const allVideos = outfit.generated_videos || [];

      return `
        <div class="outfit-card">
          <div class="outfit-header">
            <span class="outfit-name">${outfit.outfit_name}</span>
            <span class="outfit-price">₹${outfit.price || '-'}</span>
          </div>
          <div class="image-grid">
            ${allImages.map(img => `
              <div class="media-tile image-tile" 
                   data-is-image="true"
                   data-image-id="${img.image_id}" 
                   data-product-id="${outfit.product_id}"
                   data-image-url="${img.image_url}"
                   data-outfit-name="${outfit.outfit_name || ''}">
                <img src="${img.image_url}" loading="lazy">
                <div class="check"></div>
                <div class="tile-actions">
                  <button class="tile-btn" data-role="animate" title="Animate to video">🎬</button>
                  <button class="tile-btn" data-role="delete" title="Delete image">🗑</button>
                </div>
              </div>
            `).join('')}

            ${allVideos.map(vid => `
              <div class="media-tile image-tile"
                   data-is-image="false"
                   data-video-id="${vid.video_id}" 
                   data-product-id="${outfit.product_id}"
                   data-image-url="${vid.video_url}"
                   data-outfit-name="${outfit.outfit_name || ''}">
                <div class="check"></div>
                <div class="tile-actions">
                  <button class="tile-btn" data-role="delete" title="Delete Video">🗑</button>
                </div>
                <video style="width: 100%; height: 100%; object-fit: cover;" src="${vid.video_url}" muted loop playsinline onmouseover="this.play()" onmouseout="this.pause()"></video>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }).join('');

    document.querySelectorAll('.media-tile').forEach(tile => {
      tile.addEventListener('click', () => toggleMedia(tile));
      
      const animateBtn = tile.querySelector('[data-role="animate"]');
      if (animateBtn) {
        animateBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          animateImage(tile, ev.currentTarget);
        });
      }
      
      const deleteBtn = tile.querySelector('[data-role="delete"]');
      if (deleteBtn) {
        deleteBtn.addEventListener('click', (ev) => {
          ev.stopPropagation();
          console.log(tile.dataset.isImage,tile.dataset.videoId)
          tile.dataset.isImage != 'false' ? deleteImage(tile) : deleteVideo(tile.dataset.videoId);
        });
      }
    });

    renderSelectionState();
  } catch (err) {
    console.error("Error loading media:", err);
    selectView.innerHTML = '<div class="empty-state">Error loading content.</div>';
  }
}

// ─── Selection logic ─────────────────────────────────────
function toggleMedia(tile) {
  const isImage = tile.dataset.isImage === "true";
  const mediaType = isImage ? 'IMAGE' : 'VIDEO';
  const productId = tile.dataset.productId;
  const imageUrl = tile.dataset.imageUrl;
  const outfitName = tile.dataset.outfitName;
  
  let existingIndex = -1;
  if (isImage) {
    const imageId = tile.dataset.imageId;
    existingIndex = state.selected.findIndex(s => s.media_type === 'IMAGE' && s.image_id == imageId);
    if (existingIndex >= 0) {
      state.selected.splice(existingIndex, 1);
    } else {
      if (state.selected.length >= 10) {
        alert('Max 10 items per post (Instagram carousel limit).');
        return;
      }
      state.selected.push({ media_type: 'IMAGE', image_id: imageId, product_id: productId, image_url: imageUrl, outfit_name: outfitName });
    }
  } else {
    const videoId = tile.dataset.videoId;
    existingIndex = state.selected.findIndex(s => s.media_type === 'VIDEO' && s.video_id == videoId);
    if (existingIndex >= 0) {
      state.selected.splice(existingIndex, 1);
    } else {
      if (state.selected.length >= 10) {
        alert('Max 10 items per post (Instagram carousel limit).');
        return;
      }
      state.selected.push({ media_type: 'VIDEO', video_id: videoId, product_id: productId, image_url: imageUrl, outfit_name: outfitName });
    }
  }
  renderSelectionState();
}

function renderSelectionState() {
  // Update main grid interactive highlights
  document.querySelectorAll('.image-tile').forEach(tile => {
    const isImage = tile.dataset.isImage === "true";
    let idx = -1;
    if (isImage) {
      idx = state.selected.findIndex(s => s.media_type === 'IMAGE' && s.image_id == tile.dataset.imageId);
    } else {
      idx = state.selected.findIndex(s => s.media_type === 'VIDEO' && s.video_id == tile.dataset.videoId);
    }
    
    tile.classList.toggle('selected', idx >= 0);
    const existingBadge = tile.querySelector('.pos-badge');
    if (existingBadge) existingBadge.remove();
    if (idx >= 0) {
      const badge = document.createElement('div');
      badge.className = 'pos-badge';
      badge.textContent = idx + 1;
      tile.appendChild(badge);
    }
  });

  // Cross-sync video actions tab buttons if rendered
  document.querySelectorAll('[data-action="select-video"]').forEach(btn => {
    const videoId = btn.dataset.id;
    const isSelected = state.selected.some(s => s.media_type === 'VIDEO' && s.video_id == videoId);
    btn.textContent = isSelected ? 'Remove from post' : 'Add to post';
  });

  // Render lower tray drawer summary
  const count = state.selected.length;
  if (count > 0) {
    tray.classList.add('open');
    const hasVideo = state.selected.some(s => s.media_type === 'VIDEO');
    const type = count === 1 ? (hasVideo ? 'Reel' : 'Single post') : 'Carousel';
    traySummaryText.textContent = `${count} selected — ${type}`;
    selectedStrip.innerHTML = state.selected.map(s =>
      s.media_type === 'VIDEO'
        ? `<video src="${s.image_url}" muted></video>`
        : `<img src="${s.image_url}">`
    ).join('');
  } else {
    tray.classList.remove('open');
  }
}

document.getElementById('clearSelection').addEventListener('click', () => {
  state.selected = [];
  renderSelectionState();
});

// ─── Combine selected clips ──
document.getElementById('combineBtn').addEventListener('click', combineSelected);

async function combineSelected() {
  if (state.selected.length < 2) {
    alert('Pick at least 2 images/videos (in the order you want them to play) first.');
    return;
  }

  const items = state.selected.map(s => ({
    media_type: s.media_type || 'IMAGE',
    image_url: s.image_url,
    product_id: s.product_id
  }));

  const combineBtn = document.getElementById('combineBtn');
  const originalText = combineBtn.textContent;
  combineBtn.textContent = 'Starting…';
  combineBtn.disabled = true;

  try {
    const res = await fetch('/api/videos/combine', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items })
    });
    const data = await res.json();
    if (res.ok) {
      alert('Combining started! This can take a minute or two — it\'ll show up as a new video once ready.');
      state.selected = [];
      renderSelectionState();
      loadMedia();
    } else {
      alert('Failed to start combining: ' + (data.error || 'unknown error'));
    }
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    combineBtn.textContent = originalText;
    combineBtn.disabled = false;
  }
}

// ─── Delete image ────────────────────────────────────────
async function deleteImage(tile) {
  if (!confirm('Delete this image? This cannot be undone.')) return;
  const imageId = tile.dataset.imageId;
  try {
    const res = await fetch('/api/images/' + imageId, { method: 'DELETE' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      alert(data.error || 'Failed to delete image.');
      return;
    }
    const idx = state.selected.findIndex(s => s.media_type === 'IMAGE' && s.image_id == imageId);
    if (idx >= 0) state.selected.splice(idx, 1);
    tile.remove();
    renderSelectionState();
  } catch (err) {
    alert('Error deleting image: ' + err.message);
  }
}

// ─── Animate image → video (Magic Hour) ────────────────────
async function animateImage(tile, btn) {
  const userPrompt = prompt(
    'Describe the motion (optional):',
    'Subtle natural motion, fabric sway, gentle camera drift'
  );
  if (userPrompt === null) return;

  const originalText = btn.textContent;
  btn.textContent = '⏳';
  btn.disabled = true;

  try {
    const res = await fetch('/api/videos/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        image_id: tile.dataset.imageId,
        product_id: tile.dataset.productId,
        image_url: tile.dataset.imageUrl,
        prompt: userPrompt
      })
    });
    const data = await res.json();
    if (res.ok) {
      alert('Video generation started! Check the Videos tab in a few minutes.');
    } else {
      alert('Failed to start video generation: ' + (data.error || 'unknown error'));
    }
  } catch (err) {
    alert('Error: ' + err.message);
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

// ─── Videos tab ──────────────────────────────────────────
async function loadVideos() {
  try {
    const res = await fetch('/api/videos');
    const videos = await res.json();

    if (videos.length === 0) {
      videosView.innerHTML = '<div class="empty-state">No videos yet. Tap 🎬 on any image to animate it.</div>';
      return;
    }

    const anyProcessing = videos.some(v => v.status === 'processing');

    videosView.innerHTML =
      '<div class="video-hint">Videos post as a Reel on their own, or as a carousel item when combined with images.</div>' +
      videos.map(v => `
      <div class="video-card">
        <div class="video-thumb">
          ${v.status === 'ready'
            ? `<video src="${v.video_url}" muted loop playsinline autoplay></video>`
            : `<img src="${v.source_image_url}">`}
          <div class="video-status-badge status-${v.status}">${v.status}</div>
        </div>
        <div class="video-info">
          <span class="outfit-name">${v.outfit_name || ((v.brand || '') + ' ' + (v.name || ''))}</span>
          ${v.status === 'ready' ? `
            <div class="video-actions">
              <button class="btn small" data-action="select-video" data-id="${v.id}">Add to post</button>
              <button class="btn secondary small" data-action="delete-video" data-id="${v.id}">Delete</button>
            </div>` :
          v.status === 'failed' ? `
            <div style="font-size:12px;color:var(--danger);">${v.error_message || 'Generation failed'}</div>
            <button class="btn secondary small" data-action="delete-video" data-id="${v.id}">Remove</button>` :
            `<div style="font-size:12px;color:var(--text-dim);">Processing… this can take a few minutes</div>`
          }
        </div>
      </div>
    `).join('');

    videosView.querySelectorAll('[data-action="select-video"]').forEach(btn => {
      const v = videos.find(v => v.id == btn.dataset.id);
      btn.addEventListener('click', () => selectVideoForPost(v, btn));
    });
    
    videosView.querySelectorAll('[data-action="delete-video"]').forEach(btn => {
      btn.addEventListener('click', () => deleteVideo(btn.dataset.id));
    });

    if (!anyProcessing) clearInterval(videoPollTimer);
    renderSelectionState();
  } catch (err) {
    console.error("Error loading videos:", err);
  }
}

function selectVideoForPost(video, btn) {
  const idx = state.selected.findIndex(s => s.media_type === 'VIDEO' && s.video_id == video.id);
  if (idx >= 0) {
    state.selected.splice(idx, 1);
  } else {
    if (state.selected.length >= 10) { alert('Max 10 items per post.'); return; }
    state.selected.push({
      media_type: 'VIDEO',
      video_id: video.id,
      product_id: video.product_id,
      image_url: video.video_url,
      outfit_name: video.outfit_name
    });
  }
  renderSelectionState();
}

async function deleteVideo(id) {
  console.log("here")
  if (!confirm('Delete this video? This removes it from Cloudinary too.')) return;
  try {
    const res = await fetch('/api/videos/' + id, { method: 'DELETE' });
    const data = await res.json().catch(() => ({}));
    if (!res.ok) {
      alert(data.error || 'Failed to delete video.');
      return;
    }
    const idx = state.selected.findIndex(s => s.media_type === 'VIDEO' && s.video_id == id);
    if (idx >= 0) state.selected.splice(idx, 1);
    renderSelectionState();
    loadVideos();
  } catch (err) {
    alert('Error deleting video: ' + err.message);
  }
}

document.getElementById('confirmQueue').addEventListener('click', async () => {
  const caption = document.getElementById('captionInput').value;
  const scheduled_for = document.getElementById('scheduleInput').value;

  const items = state.selected.map((s, i) => ({
    product_id: s.product_id,
    image_id: s.media_type === 'VIDEO' ? null : s.image_id,
    video_id: s.media_type === 'VIDEO' ? s.video_id : null,
    image_url: s.image_url,
    media_type: s.media_type || 'IMAGE',
    position: i + 1
  }));

  try {
    const res = await fetch('/api/queue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, caption, scheduled_for })
    });

    if (res.ok) {
      modalBackdrop.classList.remove('open');
      state.selected = [];
      renderSelectionState();
      alert('Added to queue!');
    } else {
      const data = await res.json().catch(() => ({}));
      alert('Failed to add to queue: ' + (data.error || 'Unknown error'));
    }
  } catch (err) {
    alert('Error queuing post: ' + err.message);
  }
});

// ─── Queue view ──────────────────────────────────────────
async function loadQueue() {
  queueView.innerHTML = '<div class="empty-state">Loading…</div>';
  try {
    const res = await fetch('/api/queue');
    const items = await res.json();

    if (items.length === 0) {
      queueView.innerHTML = '<div class="empty-state">No posts queued yet.</div>';
      return;
    }

    queueView.innerHTML = items.map(item => {
      const typeByPosition = {};
      (item.products || []).forEach(p => { typeByPosition[p.position] = p.media_type; });
      return `
      <div class="queue-item">
        <div class="q-row">
          <span class="q-time">${item.scheduled_for ? new Date(item.scheduled_for).toLocaleString() : 'Not scheduled'}</span>
          <span>
            <span class="q-status">${item.status}</span>
            ${item.media_type ? `<span class="q-media-type">${item.media_type}</span>` : ''}
          </span>
        </div>
        <div class="q-imgs">${(item.image_urls || []).map((u, i) =>
          typeByPosition[i + 1] === 'VIDEO'
            ? `<video src="${u}" muted></video>`
            : `<img src="${u}">`
        ).join('')}</div>
        <div class="q-caption">${(item.caption || '').slice(0, 100)}</div>
        ${item.status === 'pending' ? `<button class="q-delete" data-action="delete-queue" data-id="${item.id}">Remove from queue</button>` : ''}
      </div>
    `;
    }).join('');

    queueView.querySelectorAll('[data-action="delete-queue"]').forEach(btn => {
      btn.addEventListener('click', () => deleteQueueItem(btn.dataset.id));
    });
  } catch (err) {
    console.error("Error loading queue:", err);
    queueView.innerHTML = '<div class="empty-state">Error loading queue.</div>';
  }
}

async function deleteQueueItem(id) {
  if (!confirm('Remove this post from the queue?')) return;
  try {
    await fetch('/api/queue/' + id, { method: 'DELETE' });
    loadQueue();
  } catch (err) {
    alert('Error deleting queue item: ' + err.message);
  }
}

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post Queue Dashboard</title>
<style>
  :root {
    --bg: #15161a;
    --surface: #1e2025;
    --surface-2: #262931;
    --border: #34373f;
    --text: #ece9e2;
    --text-dim: #9a9da6;
    --accent: #d97757;
    --accent-soft: rgba(217, 119, 87, 0.16);
    --success: #6fae8f;
    --radius: 10px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    padding-bottom: 100px;
  }
  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
  }
  header h1 {
    font-size: 17px;
    margin: 0 0 10px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  select {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 12px;
    font-size: 15px;
  }
  .tabs {
    display: flex;
    gap: 6px;
    margin-top: 10px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text-dim);
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .tab.active {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: var(--accent);
  }

  main { padding: 14px; }

  .outfit-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
  }
  .outfit-header {
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .outfit-name { font-size: 14px; font-weight: 600; }
  .outfit-price { font-size: 13px; color: var(--text-dim); }
  .image-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }
  .image-tile {
    position: relative;
    aspect-ratio: 3/4;
    overflow: hidden;
  }
  .image-tile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .image-tile .check {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.8);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: white;
  }
  .image-tile .pos-badge {
    position: absolute;
    top: 6px;
    left: 6px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .image-tile.selected .check {
    background: var(--accent);
    border-color: var(--accent);
  }
  .image-tile.selected .check::after { content: "✓"; }
  .image-tile.selected { outline: 2px solid var(--accent); outline-offset: -2px; }

  /* Selection tray */
  .tray {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface-2);
    border-top: 1px solid var(--border);
    padding: 12px 14px;
    z-index: 20;
    transform: translateY(100%);
    transition: transform 0.2s ease;
  }
  .tray.open { transform: translateY(0); }
  .tray-summary {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .tray-summary strong { font-size: 14px; }
  .btn {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
  }
  .btn.secondary {
    background: var(--surface);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn.full { width: 100%; padding: 13px; }

  .float-tray-toggle {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: var(--accent);
    color: white;
    border-radius: 30px;
    padding: 12px 18px;
    font-weight: 700;
    font-size: 14px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    z-index: 19;
    border: none;
  }

  /* Modal for caption/schedule */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 30;
    display: none;
    align-items: flex-end;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface);
    width: 100%;
    border-radius: 16px 16px 0 0;
    padding: 18px;
    max-height: 85vh;
    overflow-y: auto;
  }
  .modal h2 { font-size: 16px; margin: 0 0 14px; }
  .modal label {
    font-size: 12px;
    color: var(--text-dim);
    display: block;
    margin: 12px 0 6px;
  }
  textarea, input[type=datetime-local] {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px;
    font-size: 14px;
    font-family: inherit;
  }
  textarea { min-height: 90px; resize: vertical; }
  .selected-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 4px;
  }
  .selected-strip img {
    width: 56px;
    height: 70px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 16px;
  }
  .modal-actions .btn { flex: 1; }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 40px 20px;
    font-size: 14px;
  }
  .queue-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 10px;
  }
  .queue-item .q-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .queue-item .q-time { font-size: 13px; color: var(--accent); font-weight: 600; }
  .queue-item .q-status {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--surface-2);
    color: var(--text-dim);
  }
  .queue-item .q-imgs { display: flex; gap: 4px; margin: 8px 0; }
  .queue-item .q-imgs img { width: 40px; height: 50px; object-fit: cover; border-radius: 4px; }
  .queue-item .q-caption { font-size: 13px; color: var(--text-dim); }
  .queue-item .q-delete {
    font-size: 12px;
    color: #c97b7b;
    background: none;
    border: none;
    margin-top: 8px;
  }
</style>
</head>
<body>

<header>
  <h1>📋 Post Queue Dashboard</h1>
  <select id="categorySelect"><option value="">Loading categories…</option></select>
  <div class="tabs">
    <div class="tab active" data-view="select">Select Images</div>
    <div class="tab" data-view="queue">Queue</div>
  </div>
</header>

<main id="selectView"></main>
<main id="queueView" style="display:none;"></main>

<button class="float-tray-toggle" id="trayToggle" style="display:none;"></button>

<div class="tray" id="tray">
  <div class="tray-summary">
    <strong id="traySummaryText">0 selected</strong>
    <button class="btn secondary" id="clearSelection">Clear</button>
  </div>
  <div class="selected-strip" id="selectedStrip"></div>
  <button class="btn full" id="openCaptionModal" style="margin-top:10px;">Continue →</button>
</div>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal">
    <h2>Create post</h2>
    <div class="selected-strip" id="modalSelectedStrip"></div>

    <label>Post type</label>
    <div id="postTypeLabel" style="font-size:14px;"></div>

    <label>Caption</label>
    <textarea id="captionInput" placeholder="Write a caption…"></textarea>

    <label>Schedule for</label>
    <input type="datetime-local" id="scheduleInput">

    <div class="modal-actions">
      <button class="btn secondary" id="cancelModal">Cancel</button>
      <button class="btn" id="confirmQueue">Add to Queue</button>
    </div>
  </div>
</div>

<script>
const state = {
  selected: [], // { product_id, image_id, image_url, outfit_name }
  category: ''
};

const selectView = document.getElementById('selectView');
const queueView = document.getElementById('queueView');
const categorySelect = document.getElementById('categorySelect');
const tray = document.getElementById('tray');
const traySummaryText = document.getElementById('traySummaryText');
const selectedStrip = document.getElementById('selectedStrip');
const modalBackdrop = document.getElementById('modalBackdrop');

// ─── Tabs ───────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    if (tab.dataset.view === 'select') {
      selectView.style.display = 'block';
      queueView.style.display = 'none';
    } else {
      selectView.style.display = 'none';
      queueView.style.display = 'block';
      loadQueue();
    }
  });
});

// ─── Load categories ────────────────────────────────────
async function loadCategories() {
  const res = await fetch('/api/categories');
  const cats = await res.json();
  categorySelect.innerHTML = '<option value="">All categories</option>' +
    cats.map(c => `<option value="${c.category}">${c.category} (${c.image_count})</option>`).join('');
}

categorySelect.addEventListener('change', () => {
  state.category = categorySelect.value;
  loadImages();
});

// ─── Load images grouped by outfit ──────────────────────
async function loadImages() {
  selectView.innerHTML = '<div class="empty-state">Loading…</div>';
  const res = await fetch('/api/images?category=' + encodeURIComponent(state.category));
  const outfits = await res.json();

  if (outfits.length === 0) {
    selectView.innerHTML = '<div class="empty-state">No images found for this category.</div>';
    return;
  }

  selectView.innerHTML = outfits.map(outfit => `
    <div class="outfit-card">
      <div class="outfit-header">
        <span class="outfit-name">${outfit.outfit_name || outfit.brand + ' ' + outfit.name}</span>
        <span class="outfit-price">₹${outfit.price || '-'}</span>
      </div>
      <div class="image-grid">
        ${outfit.images.map(img => `
          <div class="image-tile" 
               data-image-id="${img.image_id}" 
               data-product-id="${outfit.product_id}"
               data-image-url="${img.image_url}"
               data-outfit-name="${outfit.outfit_name}">
            <img src="${img.image_url}" loading="lazy">
            <div class="check"></div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');

  document.querySelectorAll('.image-tile').forEach(tile => {
    tile.addEventListener('click', () => toggleImage(tile));
  });

  renderSelectionState();
}

// ─── Selection logic ─────────────────────────────────────
function toggleImage(tile) {
  const imageId = tile.dataset.imageId;
  const existingIndex = state.selected.findIndex(s => s.image_id == imageId);

  if (existingIndex >= 0) {
    state.selected.splice(existingIndex, 1);
  } else {
    if (state.selected.length >= 10) {
      alert('Max 10 images per post (Instagram carousel limit).');
      return;
    }
    state.selected.push({
      image_id: imageId,
      product_id: tile.dataset.productId,
      image_url: tile.dataset.imageUrl,
      outfit_name: tile.dataset.outfitName
    });
  }
  renderSelectionState();
}

function renderSelectionState() {
  // update tile UI
  document.querySelectorAll('.image-tile').forEach(tile => {
    const imageId = tile.dataset.imageId;
    const idx = state.selected.findIndex(s => s.image_id == imageId);
    tile.classList.toggle('selected', idx >= 0);
    const existingBadge = tile.querySelector('.pos-badge');
    if (existingBadge) existingBadge.remove();
    if (idx >= 0) {
      const badge = document.createElement('div');
      badge.className = 'pos-badge';
      badge.textContent = idx + 1;
      tile.appendChild(badge);
    }
  });

  // update tray
  const count = state.selected.length;
  if (count > 0) {
    tray.classList.add('open');
    const type = count === 1 ? 'Single post' : 'Carousel';
    traySummaryText.textContent = `${count} selected — ${type}`;
    selectedStrip.innerHTML = state.selected.map(s => `<img src="${s.image_url}">`).join('');
  } else {
    tray.classList.remove('open');
  }
}

document.getElementById('clearSelection').addEventListener('click', () => {
  state.selected = [];
  renderSelectionState();
});

// ─── Modal: caption + schedule ──────────────────────────
document.getElementById('openCaptionModal').addEventListener('click', () => {
  document.getElementById('modalSelectedStrip').innerHTML = 
    state.selected.map(s => `<img src="${s.image_url}">`).join('');
  document.getElementById('postTypeLabel').textContent = 
    state.selected.length === 1 ? 'Single image post' : `Carousel — ${state.selected.length} images`;

  const outfitNames = [...new Set(state.selected.map(s => s.outfit_name))];
  document.getElementById('captionInput').value = 
    outfitNames.length > 1 
      ? `${outfitNames.length} looks you'll love this week ✨\n\nDM "link" for shopping details 🛍️`
      : `${outfitNames[0]} ✨\n\nDM "link" to shop this look 🛍️`;

  const defaultTime = new Date();
  defaultTime.setDate(defaultTime.getDate() + 1);
  defaultTime.setHours(20, 0, 0, 0);
  document.getElementById('scheduleInput').value = defaultTime.toISOString().slice(0, 16);

  modalBackdrop.classList.add('open');
});

document.getElementById('cancelModal').addEventListener('click', () => {
  modalBackdrop.classList.remove('open');
});

document.getElementById('confirmQueue').addEventListener('click', async () => {
  const caption = document.getElementById('captionInput').value;
  const scheduled_for = document.getElementById('scheduleInput').value;

  const items = state.selected.map((s, i) => ({
    product_id: s.product_id,
    image_id: s.image_id,
    image_url: s.image_url,
    position: i + 1
  }));

  const res = await fetch('/api/queue', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ items, caption, scheduled_for })
  });

  if (res.ok) {
    modalBackdrop.classList.remove('open');
    state.selected = [];
    renderSelectionState();
    alert('Added to queue!');
  } else {
    alert('Failed to add to queue.');
  }
});

// ─── Queue view ──────────────────────────────────────────
async function loadQueue() {
  queueView.innerHTML = '<div class="empty-state">Loading…</div>';
  const res = await fetch('/api/queue');
  const items = await res.json();

  if (items.length === 0) {
    queueView.innerHTML = '<div class="empty-state">No posts queued yet.</div>';
    return;
  }

  queueView.innerHTML = items.map(item => `
    <div class="queue-item">
      <div class="q-row">
        <span class="q-time">${item.scheduled_for ? new Date(item.scheduled_for).toLocaleString() : 'Not scheduled'}</span>
        <span class="q-status">${item.status}</span>
      </div>
      <div class="q-imgs">${item.image_urls.map(u => `<img src="${u}">`).join('')}</div>
      <div class="q-caption">${(item.caption || '').slice(0, 100)}</div>
      ${item.status === 'pending' ? `<button class="q-delete" onclick="deleteQueueItem(${item.id})">Remove from queue</button>` : ''}
    </div>
  `).join('');
}

async function deleteQueueItem(id) {
  if (!confirm('Remove this post from the queue?')) return;
  await fetch('/api/queue/' + id, { method: 'DELETE' });
  loadQueue();
}

// ─── Init ────────────────────────────────────────────────
loadCategories();
loadImages();
</script>
</body>
</html>
